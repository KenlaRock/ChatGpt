name: AI Gate Bootstrap

on:
  pull_request:
    branches:
      - gate/ai-gate-v0-2-1-bootstrap

permissions:
  contents: read

concurrency:
  group: ai-gate-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-gate-bootstrap:
    name: ai-gate-bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout trusted bootstrap base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout candidate without credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base object into candidate history
        working-directory: candidate
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.sha }}"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install pinned gate dependency
        run: python -m pip install jsonschema==4.25.1

      - name: Preflight with bootstrap-base code
        working-directory: candidate
        run: |
          python -I ../trusted/tools/ai_gate/check_ai_gate.py \
            --phase preflight \
            --proof ai/session-proof.json \
            --control-report ai/control-report.md \
            --schema ../trusted/schemas/ai-session-proof.schema.json \
            --config ../trusted/docs/governance/AI_GATE_CONFIG.json \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --branch "${{ github.event.pull_request.head.ref }}"

      - name: Run fixed profile with bootstrap-base runner
        working-directory: candidate
        run: |
          python -I ../trusted/tools/ai_gate/run_test_profile.py \
            --proof ai/session-proof.json \
            --config ../trusted/docs/governance/AI_GATE_CONFIG.json \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --output "${RUNNER_TEMP}/ai-gate-test-evidence.json"

      - name: Final gate with bootstrap-base code
        working-directory: candidate
        run: |
          python -I ../trusted/tools/ai_gate/check_ai_gate.py \
            --phase final \
            --proof ai/session-proof.json \
            --control-report ai/control-report.md \
            --schema ../trusted/schemas/ai-session-proof.schema.json \
            --config ../trusted/docs/governance/AI_GATE_CONFIG.json \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --test-evidence "${RUNNER_TEMP}/ai-gate-test-evidence.json"
